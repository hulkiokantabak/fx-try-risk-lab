services:
  app:
    build:
      context: .
    container_name: fx-try-risk-app
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  caddy:
    image: caddy:2.8-alpine
    container_name: fx-try-risk-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

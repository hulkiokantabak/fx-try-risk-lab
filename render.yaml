services:
  - type: web
    name: hulki-fx-try-risk-lab
    runtime: docker
    plan: starter
    region: frankfurt
    autoDeploy: false
    healthCheckPath: /readyz
    envVars:
      - key: FX_APP_NAME
        value: FX TRY Risk Lab
      - key: FX_ENVIRONMENT
        value: production
      - key: FX_HOST
        value: 0.0.0.0
      - key: FX_PORT
        value: "10000"
      - key: FX_RELOAD
        value: "false"
      - key: FX_FORWARDED_ALLOW_IPS
        value: "*"
      - key: FX_SECURE_COOKIES
        value: "true"
      - key: FX_ALLOWED_HOSTS
        value: "*"
      - key: FX_SESSION_SECRET
        generateValue: true
    disk:
      name: fx-try-risk-data
      mountPath: /app/data
      sizeGB: 5

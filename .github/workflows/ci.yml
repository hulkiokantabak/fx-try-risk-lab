name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/data/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate browser bundle
        run: python scripts/validate_browser_bundle.py

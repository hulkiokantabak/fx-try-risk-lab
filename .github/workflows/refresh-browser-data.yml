name: Refresh Browser Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1-5"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build browser snapshot
        run: python scripts/build_browser_data.py

      - name: Commit updated browser data
        run: |
          if git diff --quiet -- docs/data; then
            echo "No browser-data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "Refresh browser data"
          git push

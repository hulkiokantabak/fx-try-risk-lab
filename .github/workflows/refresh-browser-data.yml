name: Refresh Browser Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1-5"

permissions:
  contents: read

concurrency:
  group: refresh-browser-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Build browser snapshot
        run: python scripts/build_browser_data.py

      - name: Validate browser bundle
        run: python scripts/validate_browser_bundle.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check browser JavaScript syntax
        run: node --check docs/app.js

      - name: Commit updated browser data
        run: |
          if git diff --quiet -- docs/data; then
            echo "No browser-data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "Refresh browser data"
          git push
